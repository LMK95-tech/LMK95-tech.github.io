<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio E5 | Mashala Nkole Lenny | LMK.SISR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber_purple: '#8b5cf6',
                        cyber_glow: '#a855f7',
                        dark_bg: '#050508',
                        card_bg: '#0d0d15',
                        accent: '#d8b4fe'
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'grid-move': 'gridMove 30s linear infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'scanline': 'scanline 6s linear infinite',
                    },
                    keyframes: {
                        gridMove: { '0%': { backgroundPosition: '0 0' }, '100%': { backgroundPosition: '0 40px' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-15px)' } },
                        scanline: { '0%': { top: '-10%' }, '100%': { top: '110%' } }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #050508; color: #e2e8f0; overflow-x: hidden; }
        .cyber-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1; animation: grid-move 30s linear infinite;
        }
        .glass { background: rgba(13, 13, 21, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(139, 92, 246, 0.1); }
        .reveal-item { opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; }
        .reveal-item.active { opacity: 1; transform: translateY(0); }
        .terminal-window { font-family: 'JetBrains Mono', monospace; background-color: #0c0c0c; border: 1px solid #1e1e2e; border-radius: 8px; box-shadow: 0 0 20px rgba(139, 92, 246, 0.1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #8b5cf6; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div id="progress-bar" class="fixed top-0 left-0 h-1 bg-gradient-to-r from-cyber_purple to-accent z-[100] w-0 transition-all"></div>

    <nav class="fixed w-full z-50 glass border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-cyber_purple rounded flex items-center justify-center text-white font-bold shadow-[0_0_15px_#8b5cf6]">LMK</div>
                <h1 class="font-bold text-white tracking-widest text-sm italic">DOSSIER E5 <span class="text-cyber_purple">SISR</span></h1>
            </div>
            <div class="hidden lg:flex gap-6 text-[10px] font-bold uppercase tracking-widest text-slate-400">
                <a href="#intro" class="hover:text-cyber_purple transition">Accueil</a>
                <a href="#projets" class="hover:text-cyber_purple transition">Missions E5</a>
                <a href="#cv" class="hover:text-cyber_purple transition">Parcours</a>
            </div>
            <div class="text-[10px] font-mono text-white bg-cyber_purple/20 px-4 py-2 rounded border border-cyber_purple/30">
                Candidat: Mashala Nkole Lenny
            </div>
        </div>
    </nav>

    <section id="intro" class="min-h-screen flex items-center justify-center pt-20">
        <div class="text-center z-10 max-w-4xl px-4">
            <div class="inline-block mb-6 animate-float">
                <span class="px-4 py-2 rounded-full border border-cyber_purple/30 bg-cyber_purple/10 text-cyber_purple font-mono text-xs">
                    INSTA PARIS | SESSION 2026
                </span>
            </div>
            <h1 class="text-6xl md:text-8xl font-black text-white mb-6 tracking-tighter reveal-item">
                INFRASTRUCTURE <br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyber_purple to-accent">RESEAUX & SECURITE</span>
            </h1>
            <p class="text-lg text-slate-400 mb-10 max-w-2xl mx-auto font-light reveal-item italic">
                Analyse, déploiement et sécurisation des solutions d'infrastructure SI.
            </p>
        </div>
    </section>

    <section id="projets" class="py-24 max-w-7xl mx-auto px-6">
        <h2 class="text-3xl font-bold text-white mb-12 flex items-center gap-4">
            <span class="w-12 h-1 bg-cyber_purple"></span>
            MISSIONS E5
        </h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="mission-grid">
            </div>
    </section>

    <script>
        // Progress Bar
        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        });

        // Reveal effect
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal-item').forEach(el => observer.observe(el));
    </script>
</body>
</html>
